name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format
        run: npm run format:check
      - name: Unit tests
        run: npm test
      - name: E2E tests
        run: npm run test:e2e
      - name: Build
        run: npm run build
